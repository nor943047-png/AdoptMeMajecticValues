<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Питомцы</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        h1 {
            color: #333;
        }
        a {
            text-decoration: none;
            color: #007bff;
        }
        #list {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #fff;
            white-space: pre-wrap; /* Для правильного отображения JSON */
        }
    </style>
</head>
<body>
    <h1>Питомцы</h1>
    <a href="index.html">Назад</a>
    <div id="list">Загрузка данных...</div>
    <script>
        fetch('values.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('list').textContent = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                document.getElementById('list').textContent = 'Ошибка загрузки данных: ' + error.message;
            });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trade Calculator PRO</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; }
.container { display:flex; gap:20px; padding:20px; }
.panel { flex:1; background:#1e293b; padding:15px; border-radius:10px; }
.pet { background:#334155; padding:8px; margin:5px 0; border-radius:6px; cursor:pointer; }
.pet:hover { background:#475569; }
select { width:100%; margin-top:5px; }
.result { text-align:center; font-size:22px; margin-top:10px; }
</style>

</head>
<body>

<h2 style="text-align:center;">Adopt Me Trade Calculator PRO</h2>

<div class="container">

<div class="panel">
<h3>You</h3>
<input oninput="search(this.value,'left')" placeholder="Search...">
<div id="leftList"></div>
<div id="leftTrade"></div>
</div>

<div class="panel">
<h3>Them</h3>
<input oninput="search(this.value,'right')" placeholder="Search...">
<div id="rightList"></div>
<div id="rightTrade"></div>
</div>

</div>

<div class="result" id="result">Waiting...</div>

<script>

let pets = [];
let values = {};
let left = [];
let right = [];

// ===== LOAD VALUES =====
fetch("values.json")
.then(r=>r.json())
.then(data=>{
  values = data;
});

// ===== LOAD PETS =====
fetch("https://raw.githubusercontent.com/Beany/adopt-me-pets-data/main/pets.json")
.then(r=>r.json())
.then(data=>{
  pets = data;
  render(pets,"left");
  render(pets,"right");
});

// ===== RENDER =====
function render(list, side){
  let el = document.getElementById(side+"List");
  el.innerHTML="";
  list.slice(0,100).forEach(p=>{
    let div=document.createElement("div");
    div.className="pet";
    div.innerText=p.name;
    div.onclick=()=>add(p.name, side);
    el.appendChild(div);
  });
}

// ===== SEARCH =====
function search(t,side){
  let f=pets.filter(p=>p.name.toLowerCase().includes(t.toLowerCase()));
  render(f,side);
}

// ===== ADD =====
function add(name, side){
  let obj = {name:name, type:"N"};

  if(side==="left"){ left.push(obj); draw(left,"leftTrade"); }
  else { right.push(obj); draw(right,"rightTrade"); }

  calc();
}

// ===== DRAW =====
function draw(list,id){
  let el=document.getElementById(id);
  el.innerHTML="";

  list.forEach((p,i)=>{
    let div=document.createElement("div");
    div.className="pet";

    let select = `
    <select onchange="changeType(${i}, this.value, '${id}')">
      <option value="N">No Pot</option>
      <option value="R">Ride</option>
      <option value="F">Fly</option>
      <option value="FR">Fly Ride</option>
      <option value="NR">Neon Ride</option>
      <option value="NFR">Neon Fly Ride</option>
      <option value="MR">Mega Ride</option>
      <option value="MFR">Mega Fly Ride</option>
    </select>
    `;

    div.innerHTML = p.name + select;
    el.appendChild(div);
  });
}

// ===== CHANGE TYPE =====
function changeType(index, type, id){
  let list = id==="leftTrade" ? left : right;
  list[index].type = type;
  calc();
}

// ===== CALC =====
function calc(){
  let l=sum(left);
  let r=sum(right);

  let res="FAIR";
  if(l > r*1.1) res="WIN";
  if(r > l*1.1) res="LOSE";

  document.getElementById("result").innerText =
  `You: ${l} | Them: ${r} → ${res}`;
}

// ===== SUM =====
function sum(list){
  let t=0;
  list.forEach(p=>{
    if(values[p.name] && values[p.name][p.type]){
      t += values[p.name][p.type];
    }
  });
  return t;
}

</script>

</body>
</html>

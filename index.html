<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adopt Me Trade Calculator PRO</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
}

h1{text-align:center;padding:15px;}

.search{
  width:90%;
  margin:10px auto;
  display:block;
  padding:10px;
  border-radius:10px;
  border:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
  padding:15px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  text-align:center;
}

.card img{
  width:100%;
}

button{
  margin-top:5px;
  border:none;
  padding:5px;
  border-radius:6px;
  cursor:pointer;
}

.wrap{
  display:flex;
  gap:10px;
  padding:10px;
}

.box{
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
}

.trade{
  min-height:120px;
}

.result{
  text-align:center;
  font-size:24px;
  margin:10px;
}
</style>
</head>

<body>

<h1>Trade Calculator</h1>

<div class="wrap">
  <div class="box">
    <h3>You</h3>
    <div id="left" class="trade"></div>
  </div>
  <div class="box">
    <h3>Other</h3>
    <div id="right" class="trade"></div>
  </div>
</div>

<div class="result" id="result">0</div>

<input class="search" id="search" placeholder="Search pet...">

<div class="grid" id="pets"></div>

<script>
let allPets = []
let values = {}
let left=[], right=[]

// ===== LOAD VALUES =====
fetch("values.json")
  .then(r=>r.json())
  .then(v=>values=v)

// ===== LOAD ALL PETS (700+) =====
fetch("https://raw.githubusercontent.com/Beany/adopt-me-pets-data/main/pets.json")
  .then(r=>r.json())
  .then(data=>{
    allPets=data
    render(data)
  })

function render(list){
  let petsDiv=document.getElementById("pets")
  petsDiv.innerHTML=""

  list.forEach(p=>{
    let div=document.createElement("div")
    div.className="card"

    let img=p.image || "https://via.placeholder.com/100"

    div.innerHTML=`
      <img src="${img}">
      <div>${p.name}</div>
      <button onclick="add('${p.name}','left')">You</button>
      <button onclick="add('${p.name}','right')">Other</button>
    `

    petsDiv.appendChild(div)
  })
}

// ===== ADD PET =====
function add(name,side){
  let val = values[name]?.N || 5

  let obj={name,value:val}

  if(side=="left") left.push(obj)
  else right.push(obj)

  update()
}

// ===== UPDATE =====
function update(){
  let l=document.getElementById("left")
  let r=document.getElementById("right")

  l.innerHTML=""
  r.innerHTML=""

  left.forEach(p=>{
    l.innerHTML+=`<div>${p.name} (${p.value})</div>`
  })

  right.forEach(p=>{
    r.innerHTML+=`<div>${p.name} (${p.value})</div>`
  })

  let sumL=left.reduce((a,b)=>a+b.value,0)
  let sumR=right.reduce((a,b)=>a+b.value,0)

  let diff=sumL-sumR

  document.getElementById("result").innerText=diff
}

// ===== SEARCH =====
document.getElementById("search").oninput=e=>{
  let t=e.target.value.toLowerCase()
  render(allPets.filter(p=>p.name.toLowerCase().includes(t)))
}
</script>

</body>
</html>

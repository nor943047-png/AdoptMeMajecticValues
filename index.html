<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Питомцы</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .pet {
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
            background-color: white;
        }
        img {
            max-width: 100px;
        }
    </style>
</head>
<body>
    <h1>Питомцы</h1>
    <div id="pets-container">Загрузка питомцев...</div>

    <script>
        const currencyOptions = ['NO POTION (NP)', 'R', 'F', 'FR', 'N', 'NR', 'NF', 'NFR', 'M', 'MR', 'MF', 'MFR'];

        // Пример данных о питомцах
        const petsData = [
            {
                id: 1,
                name: "Собака",
                image: "https://example.com/dog.jpg",
                currency: "R",
                characteristics: {
                    health: 100,
                    attack: 50,
                    defense: 30
                }
            },
            {
                id: 2,
                name: "Кошка",
                image: "https://example.com/cat.jpg",
                currency: "F",
                characteristics: {
                    health: 80,
                    attack: 40,
                    defense: 20
                }
            },
            {
                id: 3,
                name: "Попугай",
                image: "https://example.com/parrot.jpg",
                currency: "M",
                characteristics: {
                    health: 60,
                    attack: 20,
                    defense: 10
                }
            }
        ];

        function renderPets(pets) {
            const container = document.getElementById('pets-container');
            container.innerHTML = ''; // Очищаем контейнер перед отрисовкой

            pets.forEach(pet => {
                const petDiv = document.createElement('div');
                petDiv.className = 'pet';
                petDiv.innerHTML = 
                    <h2>${pet.name}</h2>
                    <img src="${pet.image}" alt="${pet.name}">
                    <p>Валюта: 
                        <select onchange="changeCurrency(${pet.id}, this.value)">
                            ${currencyOptions.map(option => <option value="${option}" ${option === pet.currency ? 'selected' : ''}>${option}</option>).join('')}
                        </select>
                    </p>
                    <p>Здоровье: ${pet.characteristics.health}</p>
                    <p>Атака: ${pet.characteristics.attack}</p>
                    <p>Защита: ${pet.characteristics.defense}</p>
                ;
                container.appendChild(petDiv);
            });
        }

        function changeCurrency(petId, newCurrency) {
            // Обновляем валюту питомца в интерфейсе
            const petDiv = document.querySelector(.pet:nth-child(${petId}));
            if (petDiv) {
                const currencySelect = petDiv.querySelector('select');
                currencySelect.value = newCurrency; // Изменяем валюту питомца
            }
        }

        // Отрисовываем питомцев при загрузке страницы
        renderPets(petsData);
    </script>
</body>
</html>

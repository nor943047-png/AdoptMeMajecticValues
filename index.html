<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adopt Me Trade Full</title>

<style>
body{margin:0;background:#0f172a;color:#fff;font-family:sans-serif}
h1{text-align:center;padding:10px}
.container{display:flex;gap:10px;padding:10px;flex-wrap:wrap}
.panel{flex:1;min-width:280px;background:#1e293b;padding:10px;border-radius:12px;position:relative}
.item{display:flex;align-items:center;gap:8px;background:#334155;margin:5px 0;padding:6px;border-radius:8px}
.item img{width:35px;height:35px}
.plus{width:100%;padding:8px;background:#22c55e;border:none;border-radius:8px;margin-top:5px}
.menu{display:none;position:absolute;top:60px;left:10px;right:10px;background:#020617;border-radius:10px;max-height:300px;overflow:auto;padding:8px}
.search{width:100%;padding:6px;margin-bottom:5px;border-radius:6px;border:none}
.pet{display:flex;align-items:center;gap:8px;padding:6px;border-radius:6px;cursor:pointer}
.pet:hover{background:#1e293b}
.pet img{width:30px;height:30px}
.result{text-align:center;font-size:20px;padding:10px}
</style>
</head>

<body>

<h1>💎 Adopt Me Trade Full</h1>

<div class="container">

<div class="panel">
<h3>You</h3>
<div id="L"></div>
<button class="plus" onclick="toggle('menuL')">+</button>
<div id="menuL" class="menu">
<input class="search" placeholder="Search..." oninput="filter(this,'listL')">
<div id="listL"></div>
</div>
</div>

<div class="panel">
<h3>Them</h3>
<div id="R"></div>
<button class="plus" onclick="toggle('menuR')">+</button>
<div id="menuR" class="menu">
<input class="search" placeholder="Search..." oninput="filter(this,'listR')">
<div id="listR"></div>
</div>
</div>

</div>

<div class="result" id="res">Loading pets...</div>

<script>

let pets = [];
let L = [], R = [];

// ===== ЗАГРУЗКА ПИТОМЦЕВ (много) =====
async function loadPets(){

let all = [];
let pages = 10; // увеличь до 20 если хочешь больше

for(let i=0;i<pages;i++){
try{
let url = "https://adoptme.fandom.com/api.php?action=query&list=categorymembers&cmtitle=Category:Pets&cmlimit=50&format=json&origin=*";
let res = await fetch(url);
let data = await res.json();

if(data.query){
data.query.categorymembers.forEach(p=>{
all.push({
name: p.title.replace(" (Pet)",""),
value: Math.floor(Math.random()*500)+100,
img: "https://via.placeholder.com/40"
});
});
}
}catch(e){}
}

pets = all;
renderList();
document.getElementById("res").innerText = "Loaded: " + pets.length + " pets";
}

loadPets();

// ===== UI =====

function toggle(id){
let el=document.getElementById(id);
el.style.display=el.style.display==="block"?"none":"block";
}

function renderList(){
let l=document.getElementById("listL");
let r=document.getElementById("listR");

l.innerHTML=""; r.innerHTML="";

pets.forEach(p=>{
let html = `<div class="pet" onclick='add(${JSON.stringify(p)},"L")'>
<img src="${p.img}"> ${p.name}
</div>`;

l.innerHTML+=html;
r.innerHTML+=html.replace('"L"','"R"');
});
}

function filter(input,id){
let val=input.value.toLowerCase();
document.querySelectorAll("#"+id+" .pet").forEach(e=>{
e.style.display=e.innerText.toLowerCase().includes(val)?"flex":"none";
});
}

function add(p,side){
(side==="L"?L:R).push(p);
draw();
calc();
}

function draw(){
drawSide("L",L);
drawSide("R",R);
}

function drawSide(id,arr){
let el=document.getElementById(id);
el.innerHTML="";
arr.forEach(p=>{
el.innerHTML+=`<div class="item"><img src="${p.img}">${p.name} (${p.value})</div>`;
});
}

function calc(){
let l=L.reduce((s,p)=>s+p.value,0);
let r=R.reduce((s,p)=>s+p.value,0);

let res="Fair";
if(l>r) res="Lose";
if(r>l) res="Win";

document.getElementById("res").innerText =
`You: ${l} | Them: ${r} → ${res}`;
}

</script>

</body>
</html>

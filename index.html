<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adopt Me Trade</title>

<style>
body{margin:0;background:#0f172a;color:#fff;font-family:sans-serif}
h1{text-align:center;padding:10px}

.container{display:flex;gap:10px;padding:10px}
.panel{flex:1;background:#1e293b;border-radius:12px;padding:10px;position:relative}

.tradeItem{display:flex;align-items:center;gap:8px;background:#334155;margin:5px 0;padding:6px;border-radius:8px}
.tradeItem img{width:35px;height:35px}

.plus{width:100%;padding:8px;background:#22c55e;border:none;border-radius:8px;margin-top:5px}

.menu{display:none;position:absolute;top:60px;left:10px;right:10px;background:#020617;border-radius:10px;max-height:300px;overflow:auto;padding:8px}
.search{width:100%;padding:6px;margin-bottom:5px;border-radius:6px;border:none}

.pet{display:flex;align-items:center;gap:8px;padding:6px;border-radius:6px;cursor:pointer}
.pet:hover{background:#1e293b}
.pet img{width:30px;height:30px}

.result{text-align:center;font-size:20px;padding:10px}
</style>
</head>

<body>

<h1>Adopt Me Trade</h1>

<div class="container">

<div class="panel">
<h3>You</h3>
<div id="left"></div>
<button class="plus" onclick="toggle('menuL')">+</button>
<div id="menuL" class="menu">
<input class="search" placeholder="Search..." oninput="filter(this,'listL')">
<div id="listL"></div>
</div>
</div>

<div class="panel">
<h3>Them</h3>
<div id="right"></div>
<button class="plus" onclick="toggle('menuR')">+</button>
<div id="menuR" class="menu">
<input class="search" placeholder="Search..." oninput="filter(this,'listR')">
<div id="listR"></div>
</div>
</div>

</div>

<div class="result" id="res">Ready</div>

<script>

// ===== DATA =====
const pets = {
"Shadow Dragon":{N:1500,R:1700,F:1700,FR:1900,NFR:3000},
"Bat Dragon":{N:1400,R:1600,F:1600,FR:1800,NFR:2800},
"Frost Dragon":{N:900,R:1000,F:1000,FR:1100,NFR:1800},
"Giraffe":{N:800,R:900,F:900,FR:1000,NFR:1600},
"Owl":{N:700,R:800,F:800,FR:900,NFR:1500},
"Parrot":{N:600,R:700,F:700,FR:800,NFR:1400},
"Crow":{N:500,R:600,F:600,FR:700,NFR:1200},
"Evil Unicorn":{N:550,R:650,F:650,FR:750,NFR:1300},
"Turtle":{N:200,R:250,F:250,FR:300,NFR:600},
"Kangaroo":{N:180,R:220,F:220,FR:260,NFR:550}
};

const names = Object.keys(pets);

let L=[], R=[];

// ===== IMAGE =====
function img(n){
return "https://adoptme.fandom.com/wiki/Special:Redirect/file/"+n.replaceAll(" ","_")+".png";
}

// ===== MENU =====
function build(id){
let el=document.getElementById(id);
el.innerHTML="";
names.forEach(n=>{
let d=document.createElement("div");
d.className="pet";

let i=document.createElement("img");
i.src=img(n);
i.onerror=()=>i.src="https://via.placeholder.com/30";

let t=document.createElement("span");
t.innerText=n;

d.append(i,t);
d.onclick=()=>add(n,id.includes("L")?"L":"R");

el.appendChild(d);
});
}
build("listL"); build("listR");

// ===== SEARCH =====
function filter(input,id){
let v=input.value.toLowerCase();
document.querySelectorAll("#"+id+" .pet").forEach(p=>{
p.style.display=p.innerText.toLowerCase().includes(v)?"flex":"none";
});
}

// ===== TOGGLE =====
function toggle(id){
let m=document.getElementById(id);
m.style.display=m.style.display==="block"?"none":"block";
}

// ===== ADD =====
function add(n,side){
let obj={n:n,t:"N"};
(side==="L"?L:R).push(obj);
draw();
calc();
}

// ===== DRAW =====
function draw(){
render(L,"left");
render(R,"right");
}

function render(arr,id){
let el=document.getElementById(id);
el.innerHTML="";
arr.forEach(p=>{
let d=document.createElement("div");
d.className="tradeItem";

let i=document.createElement("img");
i.src=img(p.n);
i.onerror=()=>i.src="https://via.placeholder.com/35";

let s=document.createElement("span");
s.innerText=p.n;

let sel=document.createElement("select");
["N","R","F","FR","NFR"].forEach(t=>{
let o=document.createElement("option");
o.value=t;o.innerText=t;
sel.appendChild(o);
});
sel.onchange=e=>{p.t=e.target.value;calc();};

d.append(i,s,sel);
el.appendChild(d);
});
}

// ===== CALC =====
function calc(){
let a=sum(L), b=sum(R);
let r="FAIR";
if(a>b*1.1) r="WIN";
if(b>a*1.1) r="LOSE";
document.getElementById("res").innerText=`You ${a} | Them ${b} → ${r}`;
}

function sum(arr){
let t=0;
arr.forEach(p=>t+=pets[p.n][p.t]||0);
return t;
}

</script>

</body>
</html>

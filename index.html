<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adopt Me Trade</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:sans-serif;
}

.container {
  display:flex;
  gap:20px;
  padding:20px;
}

.box {
  flex:1;
  background:#1e293b;
  padding:15px;
  border-radius:15px;
}

.list {
  max-height:300px;
  overflow:auto;
}

.pet {
  display:flex;
  align-items:center;
  gap:10px;
  padding:5px;
  cursor:pointer;
}

.pet img {
  width:40px;
}

.search {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

.menu {
  position:fixed;
  top:0;
  right:0;
  width:300px;
  height:100%;
  background:#020617;
  padding:10px;
  transform:translateX(100%);
  transition:.3s;
}

.menu.active {
  transform:translateX(0);
}

.plus {
  position:fixed;
  bottom:20px;
  right:20px;
  font-size:30px;
  background:#38bdf8;
  padding:15px;
  border-radius:50%;
  cursor:pointer;
}

.close {
  cursor:pointer;
  margin-bottom:10px;
}

.select {
  margin-top:5px;
}

.total {
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1 style="text-align:center;">💎 Adopt Me Trade</h1>

<div class="container">
  <div class="box">
    <h2>You</h2>
    <div id="youList"></div>
    <div class="total" id="youTotal">0</div>
  </div>

  <div class="box">
    <h2>Them</h2>
    <div id="themList"></div>
    <div class="total" id="themTotal">0</div>
  </div>
</div>

<div class="plus" onclick="toggleMenu()">+</div>

<div class="menu" id="menu">
  <div class="close" onclick="toggleMenu()">❌ Close</div>
  <input class="search" id="search" placeholder="Search..." oninput="renderPets()">
  <div id="petList"></div>
</div>

<script>
let pets = [];
let side = "you";

fetch("values.json")
.then(r=>r.json())
.then(data=>{
  pets = data;
  renderPets();
});

function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}

function renderPets() {
  let search = document.getElementById("search").value.toLowerCase();
  let html = "";

  pets.filter(p=>p.name.toLowerCase().includes(search))
  .forEach(p=>{
    html += `
    <div class="pet" onclick="addPet('${p.name}',${p.value})">
      <img src="${p.img}">
      ${p.name} (${p.value})
    </div>`;
  });

  document.getElementById("petList").innerHTML = html;
}

const mult = {
  "NP":1,
  "R":1.2,
  "F":1.2,
  "FR":1.4,
  "N":2,
  "NR":2.2,
  "NF":2.2,
  "NFR":2.5,
  "M":4,
  "MR":4.2,
  "MF":4.2,
  "MFR":4.5
};

function addPet(name,value){
  let m = prompt("NP / R / F / FR / N / NR / NF / NFR / M / MR / MF / MFR","NP");
  if(!mult[m]) m="NP";

  let final = Math.floor(value * mult[m]);

  let html = `
  <div class="pet">
    ${name} (${m}) = ${final}
  </div>`;

  if(side==="you"){
    document.getElementById("youList").innerHTML += html;
    document.getElementById("youTotal").innerText =
      +document.getElementById("youTotal").innerText + final;
  } else {
    document.getElementById("themList").innerHTML += html;
    document.getElementById("themTotal").innerText =
      +document.getElementById("themTotal").innerText + final;
  }

  side = side==="you" ? "them" : "you";
}
</script>

</body>
</html>
